services:
  ai-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_software_engineer_assistant
    ports:
      - "8505:8505"
    env_file:
      - .env
    volumes:
      # Persist local SQLite database files and logs on the host
      - ./assistant.db:/app/assistant.db
    restart: unless-stopped
